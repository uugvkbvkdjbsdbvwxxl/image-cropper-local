<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>本地图片裁剪</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231f6f55'/%3E%3Cpath d='M19 15v30h30' fill='none' stroke='white' stroke-width='5' stroke-linecap='round'/%3E%3Cpath d='M15 25h24v24' fill='none' stroke='white' stroke-width='5' stroke-linecap='round' opacity='.72'/%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: light;
      --bg: #eef1ed;
      --bg-top: #fbfcfa;
      --surface: #fbfcfa;
      --surface-2: #f5f7f4;
      --surface-3: #fdfffc;
      --ink: #161a17;
      --muted: #66706a;
      --subtle: #8a938d;
      --line: #dce2dc;
      --line-strong: #c4cec6;
      --accent: #1f6f55;
      --accent-strong: #185840;
      --accent-soft: #e7f2ed;
      --accent-text: #f8fffb;
      --stage: #151915;
      --stage-grid: rgba(255, 255, 255, 0.05);
      --preview-check: #ecefeb;
      --shadow: 0 18px 46px rgba(20, 29, 24, 0.1);
      --shadow-soft: 0 8px 24px rgba(20, 29, 24, 0.08);
      --radius: 8px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --bg: #0f1411;
        --bg-top: #151b17;
        --surface: #171d19;
        --surface-2: #1d241f;
        --surface-3: #222a24;
        --ink: #eef4ef;
        --muted: #a5aea8;
        --subtle: #7f8a83;
        --line: #303a33;
        --line-strong: #435047;
        --accent: #63c39b;
        --accent-strong: #8ad8b6;
        --accent-soft: rgba(99, 195, 155, 0.14);
        --accent-text: #0b1510;
        --stage: #0b0f0c;
        --stage-grid: rgba(255, 255, 255, 0.065);
        --preview-check: #242c26;
        --shadow: 0 18px 46px rgba(0, 0, 0, 0.3);
        --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.24);
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: ui-sans-serif, "Segoe UI Variable", "Segoe UI", "Microsoft YaHei UI", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 2px solid color-mix(in srgb, var(--accent) 48%, transparent);
      outline-offset: 2px;
    }

    button:disabled,
    input:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 15px 22px;
      border-bottom: 1px solid color-mix(in srgb, var(--line) 78%, transparent);
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 1px 0 color-mix(in srgb, var(--surface-3) 70%, transparent);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      color: #f8fffb;
      background: linear-gradient(145deg, #1d2420, var(--accent-strong));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16), 0 8px 18px rgba(20, 29, 24, 0.16);
      font-weight: 800;
      font-size: 15px;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      white-space: nowrap;
      font-weight: 780;
    }

    .status {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
      min-height: 16px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: min(52vw, 620px);
    }

    .top-actions,
    .toolbar,
    .button-row,
    .segmented,
    .ratio-grid,
    .preset-grid {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .top-actions .btn {
      min-width: 92px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
      padding: 16px;
      min-height: 0;
    }

    .workspace,
    .side-panel {
      min-width: 0;
      background: var(--surface);
      border: 1px solid color-mix(in srgb, var(--line-strong) 74%, transparent);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .workspace {
      display: grid;
      grid-template-rows: auto minmax(360px, 1fr);
      overflow: hidden;
    }

    .toolbar {
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid color-mix(in srgb, var(--line-strong) 70%, transparent);
      background: color-mix(in srgb, var(--surface) 96%, transparent);
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .side-panel .button-row .btn {
      width: 100%;
    }

    .stage {
      position: relative;
      min-height: 360px;
      background-color: var(--stage);
      background:
        linear-gradient(45deg, var(--stage-grid) 25%, transparent 25%),
        linear-gradient(-45deg, var(--stage-grid) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--stage-grid) 75%),
        linear-gradient(-45deg, transparent 75%, var(--stage-grid) 75%),
        var(--stage);
      background-size: 22px 22px;
      background-position: 0 0, 0 11px, 11px -11px, -11px 0, 0 0;
      overflow: hidden;
      box-shadow: inset 0 18px 42px rgba(0, 0, 0, 0.28);
    }

    .stage.drag-over {
      outline: 3px solid color-mix(in srgb, var(--accent) 52%, transparent);
      outline-offset: -3px;
    }

    #editorCanvas {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 360px;
      touch-action: none;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      pointer-events: none;
    }

    .empty-box {
      width: min(440px, 92%);
      padding: 26px;
      border: 1px dashed color-mix(in srgb, var(--accent) 38%, transparent);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      box-shadow: var(--shadow-soft);
      text-align: center;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .empty-title {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 780;
    }

    .empty-copy {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.55;
    }

    .empty-box .btn {
      pointer-events: auto;
    }

    .hidden {
      display: none !important;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 0;
      overflow: auto;
      max-height: calc(100dvh - 100px);
      position: sticky;
      top: 84px;
    }

    .panel-section {
      border-bottom: 1px solid color-mix(in srgb, var(--line) 90%, transparent);
      padding: 16px;
    }

    .panel-section:last-child {
      border-bottom: 0;
    }

    .section-title {
      margin: 0 0 11px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 780;
    }

    .preview-shell {
      display: grid;
      place-items: center;
      aspect-ratio: 4 / 3;
      min-height: 186px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background-color: var(--surface-3);
      background:
        linear-gradient(45deg, var(--preview-check) 25%, transparent 25%),
        linear-gradient(-45deg, var(--preview-check) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--preview-check) 75%),
        linear-gradient(-45deg, transparent 75%, var(--preview-check) 75%),
        var(--surface-3);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0, 0 0;
      overflow: hidden;
      box-shadow: inset 0 1px 0 color-mix(in srgb, var(--surface-3) 72%, transparent);
    }

    #previewCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .metric {
      padding: 10px;
      border: 1px solid color-mix(in srgb, var(--line) 90%, transparent);
      border-radius: var(--radius);
      background: var(--surface-2);
      min-width: 0;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .metric strong {
      display: block;
      font-size: 13px;
      font-weight: 760;
      overflow-wrap: anywhere;
    }

    .btn,
    .icon-btn,
    .segmented button,
    .ratio-grid button,
    .preset-grid button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 38px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface-3);
      color: var(--ink);
      padding: 0 12px;
      box-shadow: 0 1px 1px rgba(20, 29, 24, 0.04);
      transition: background 180ms var(--ease), border-color 180ms var(--ease), color 180ms var(--ease), box-shadow 180ms var(--ease), transform 180ms var(--ease);
    }

    .btn:hover,
    .icon-btn:hover,
    .segmented button:hover,
    .ratio-grid button:hover,
    .preset-grid button:hover {
      border-color: var(--line-strong);
      background: var(--surface-2);
      box-shadow: 0 4px 12px rgba(20, 29, 24, 0.06);
    }

    .btn:active,
    .icon-btn:active,
    .segmented button:active,
    .ratio-grid button:active,
    .preset-grid button:active {
      transform: translateY(1px);
    }

    .btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--accent-text);
      box-shadow: 0 8px 18px color-mix(in srgb, var(--accent) 22%, transparent);
    }

    .btn.primary:hover {
      border-color: var(--accent-strong);
      background: var(--accent-strong);
      box-shadow: 0 10px 22px color-mix(in srgb, var(--accent) 28%, transparent);
    }

    .btn.warn {
      border-color: var(--line);
      color: var(--muted);
      background: var(--surface-3);
    }

    .icon-btn {
      width: 38px;
      padding: 0;
      font-size: 18px;
      line-height: 1;
    }

    .segmented,
    .ratio-grid,
    .preset-grid {
      gap: 6px;
    }

    .segmented {
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
    }

    .segmented button,
    .ratio-grid button,
    .preset-grid button {
      min-height: 34px;
      padding: 0 10px;
      font-size: 13px;
    }

    .segmented button {
      border-color: transparent;
      background: transparent;
      box-shadow: none;
    }

    .segmented button.active,
    .ratio-grid button.active,
    .preset-grid button.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-strong);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .segmented button.active {
      background: var(--surface-3);
      border-color: color-mix(in srgb, var(--line-strong) 85%, transparent);
      box-shadow: 0 2px 8px rgba(20, 29, 24, 0.08);
    }

    .preset-grid {
      align-items: stretch;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .preset-grid button {
      justify-content: flex-start;
      min-width: 0;
      text-align: left;
    }

    .control {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .control:last-child {
      margin-bottom: 0;
    }

    .control label,
    .inline-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 720;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .size-fields {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
    }

    .number-field {
      display: grid;
      gap: 6px;
    }

    .number-field input {
      width: 100%;
      min-height: 40px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-3);
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .check-row input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .export-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .batch-summary {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 34px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
    }

    .batch-summary span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .batch-list,
    .template-list {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }

    .batch-item,
    .template-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 36px;
      padding: 7px 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-3);
      color: var(--ink);
      font-size: 12px;
    }

    .batch-item.active,
    .template-item.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .batch-name,
    .template-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .batch-item button,
    .template-item button {
      min-height: 28px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-3);
      color: var(--ink);
      font-size: 12px;
    }

    .batch-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .template-save {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: end;
    }

    .template-save input,
    .target-size-row input {
      width: 100%;
      min-height: 40px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-3);
      color: var(--ink);
    }

    .template-empty {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .target-size-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
      margin: 8px 0 14px;
    }

    .section-heading-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-heading-row .section-title {
      margin: 0;
    }

    .compact-btn {
      min-height: 30px;
      padding-inline: 9px;
      font-size: 12px;
    }

    .adjustment-stack {
      display: grid;
      gap: 12px;
    }

    .adjustment-stack .control {
      margin: 0;
    }

    .watermark-source {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .watermark-source[hidden] {
      display: none;
    }

    .text-field {
      width: 100%;
      min-height: 40px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-3);
      color: var(--ink);
    }

    .watermark-upload-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .watermark-file-name {
      min-width: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .watermark-options {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .watermark-options .control {
      margin: 0;
    }

    #batchExportBtn {
      width: 100%;
      margin-top: 8px;
    }

    input[type="range"] {
      width: 100%;
      height: 22px;
      accent-color: var(--accent);
      background: transparent;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 999px;
      background: var(--line);
    }

    input[type="range"]::-webkit-slider-thumb {
      width: 16px;
      height: 16px;
      margin-top: -6px;
      border: 2px solid var(--surface-3);
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 28%, transparent);
    }

    input[type="range"]::-moz-range-track {
      height: 4px;
      border-radius: 999px;
      background: var(--line);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border: 2px solid var(--surface-3);
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 28%, transparent);
    }

    select {
      width: 100%;
      min-height: 40px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-3);
      color: var(--ink);
      box-shadow: 0 1px 1px rgba(20, 29, 24, 0.03);
    }

    .value-chip {
      min-width: 54px;
      text-align: right;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .kbd-hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin: 2px 0 0;
    }

    /* Apple Liquid Glass inspired web approximation. Apple does not provide a web CSS implementation. */
    :root {
      --bg: #e5ebf3;
      --bg-top: #f8fafc;
      --surface: rgba(248, 250, 253, 0.58);
      --surface-2: rgba(237, 242, 248, 0.66);
      --surface-3: rgba(255, 255, 255, 0.82);
      --ink: #152033;
      --muted: #617084;
      --subtle: #8793a3;
      --line: rgba(86, 106, 132, 0.18);
      --line-strong: rgba(68, 89, 118, 0.3);
      --accent: #2378df;
      --accent-strong: #0f5cbe;
      --accent-soft: rgba(35, 120, 223, 0.13);
      --accent-text: #f8fbff;
      --stage: #101721;
      --stage-grid: rgba(255, 255, 255, 0.045);
      --preview-check: rgba(107, 124, 146, 0.12);
      --shadow: 0 28px 72px rgba(49, 67, 94, 0.15), 0 5px 16px rgba(49, 67, 94, 0.08);
      --shadow-soft: 0 14px 38px rgba(49, 67, 94, 0.13);
      --radius: 18px;
      --radius-sm: 12px;
      --glass-edge: rgba(255, 255, 255, 0.8);
      --glass-highlight: rgba(255, 255, 255, 0.62);
      --glass-fill: rgba(246, 249, 253, 0.58);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c1118;
        --bg-top: #182230;
        --surface: rgba(24, 32, 44, 0.68);
        --surface-2: rgba(34, 44, 58, 0.74);
        --surface-3: rgba(46, 58, 74, 0.8);
        --ink: #f1f5fa;
        --muted: #aab5c4;
        --subtle: #7f8c9e;
        --line: rgba(213, 226, 244, 0.14);
        --line-strong: rgba(222, 233, 248, 0.22);
        --accent: #72b0ff;
        --accent-strong: #a1caff;
        --accent-soft: rgba(114, 176, 255, 0.16);
        --accent-text: #0a1625;
        --stage: #080c12;
        --preview-check: rgba(211, 225, 244, 0.08);
        --shadow: 0 32px 82px rgba(0, 0, 0, 0.46), 0 4px 18px rgba(0, 0, 0, 0.24);
        --shadow-soft: 0 14px 38px rgba(0, 0, 0, 0.3);
        --glass-edge: rgba(255, 255, 255, 0.2);
        --glass-highlight: rgba(255, 255, 255, 0.16);
        --glass-fill: rgba(25, 34, 47, 0.6);
      }
    }

    body {
      min-height: 100dvh;
      background:
        linear-gradient(118deg, color-mix(in srgb, var(--bg-top) 96%, #d7e4f7 4%) 0%, color-mix(in srgb, var(--bg) 96%, #edf2f8 4%) 52%, color-mix(in srgb, var(--bg) 91%, #dbe6f5 9%) 100%);
      background-attachment: fixed;
    }

    .app {
      position: relative;
      padding-bottom: 8px;
    }

    .topbar {
      top: 12px;
      z-index: 20;
      margin: 12px 18px 0;
      padding: 12px 14px 12px 16px;
      min-height: 66px;
      border: 1px solid var(--glass-edge);
      border-radius: 22px;
      background:
        linear-gradient(112deg, rgba(255, 255, 255, 0.64), rgba(255, 255, 255, 0.12) 44%, rgba(255, 255, 255, 0.34) 100%),
        var(--glass-fill);
      backdrop-filter: blur(32px) saturate(180%) contrast(1.04);
      -webkit-backdrop-filter: blur(32px) saturate(180%) contrast(1.04);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.78),
        inset 0 -1px 0 rgba(255, 255, 255, 0.16),
        0 20px 54px rgba(53, 70, 94, 0.14),
        0 2px 8px rgba(53, 70, 94, 0.06);
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 13px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.38), transparent 42%),
        linear-gradient(145deg, #3f91ef, #135fc4 72%, #0d4f9f);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.58),
        inset 0 -1px 0 rgba(5, 55, 117, 0.24),
        0 9px 20px rgba(16, 84, 173, 0.25);
    }

    h1 {
      font-size: 16px;
      font-weight: 720;
    }

    .status {
      color: var(--muted);
    }

    .layout {
      grid-template-columns: minmax(0, 1fr) 372px;
      gap: 16px;
      padding: 18px;
    }

    .workspace,
    .side-panel {
      position: relative;
      isolation: isolate;
      border: 1px solid var(--glass-edge);
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0.13) 42%, rgba(255, 255, 255, 0.3) 100%),
        var(--glass-fill);
      backdrop-filter: blur(32px) saturate(170%);
      -webkit-backdrop-filter: blur(32px) saturate(170%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.7),
        inset 0 -1px 0 rgba(255, 255, 255, 0.12),
        var(--shadow);
    }

    .workspace {
      grid-template-rows: auto minmax(360px, 1fr);
    }

    .toolbar {
      min-height: 68px;
      padding: 12px 14px;
      border-bottom-color: var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.04));
    }

    .side-panel {
      position: sticky;
      top: 92px;
      max-height: calc(100dvh - 110px);
      scrollbar-width: thin;
      scrollbar-color: var(--line-strong) transparent;
    }

    .panel-section {
      padding: 18px 18px 19px;
      border-bottom-color: var(--line);
    }

    .section-title {
      margin-bottom: 13px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 720;
    }

    .stage {
      margin: 0 8px 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        inset 0 24px 52px rgba(0, 0, 0, 0.34),
        0 14px 34px rgba(20, 29, 42, 0.2);
    }

    .empty-box {
      border-style: solid;
      border-color: rgba(255, 255, 255, 0.56);
      border-radius: 22px;
      padding: 30px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.66), rgba(255, 255, 255, 0.12) 58%, rgba(255, 255, 255, 0.34)),
        color-mix(in srgb, var(--surface) 76%, transparent);
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.82),
        var(--shadow-soft);
    }

    .preview-shell,
    .metric,
    .batch-summary,
    .batch-item,
    .template-item {
      border-color: var(--line);
      background-color: var(--surface-2);
      box-shadow:
        inset 0 1px 0 var(--glass-highlight),
        inset 0 -1px 0 rgba(62, 82, 109, 0.06),
        0 5px 14px rgba(49, 66, 89, 0.05);
    }

    .preview-shell {
      border-radius: 16px;
    }

    .btn,
    .icon-btn,
    .segmented button,
    .ratio-grid button,
    .preset-grid button,
    .number-field input,
    .template-save input,
    .target-size-row input,
    .text-field,
    select {
      border-color: var(--line);
      border-radius: var(--radius-sm);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.34), transparent 58%),
        var(--surface-3);
      box-shadow:
        inset 0 1px 0 var(--glass-highlight),
        inset 0 -1px 0 rgba(62, 82, 109, 0.06),
        0 3px 8px rgba(49, 66, 89, 0.07);
    }

    .btn:not(:disabled):hover,
    .icon-btn:not(:disabled):hover,
    .segmented button:not(:disabled):hover,
    .ratio-grid button:not(:disabled):hover,
    .preset-grid button:not(:disabled):hover {
      border-color: color-mix(in srgb, var(--accent) 38%, var(--line));
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.42), transparent 58%),
        color-mix(in srgb, var(--surface-3) 88%, var(--accent-soft));
      box-shadow:
        inset 0 1px 0 var(--glass-highlight),
        0 8px 18px rgba(49, 66, 89, 0.11);
      transform: translateY(-1px);
    }

    .btn:active,
    .icon-btn:active,
    .segmented button:active,
    .ratio-grid button:active,
    .preset-grid button:active {
      transform: scale(0.98);
    }

    .btn.primary {
      border-color: rgba(255, 255, 255, 0.34);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.34), transparent 46%),
        var(--accent);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.52),
        inset 0 -1px 0 rgba(3, 60, 133, 0.24),
        0 10px 24px color-mix(in srgb, var(--accent) 27%, transparent);
    }

    .btn.primary:hover {
      border-color: rgba(255, 255, 255, 0.42);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.4), transparent 46%),
        var(--accent-strong);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.58),
        0 12px 28px color-mix(in srgb, var(--accent) 31%, transparent);
    }

    .segmented {
      padding: 4px;
      border-color: var(--line);
      border-radius: 16px;
      background: color-mix(in srgb, var(--surface-2) 86%, transparent);
      box-shadow:
        inset 0 1px 3px rgba(54, 71, 94, 0.1),
        inset 0 -1px 0 rgba(255, 255, 255, 0.18);
    }

    .segmented button.active {
      border-color: var(--glass-edge);
      background: var(--surface-3);
      color: var(--ink);
      border-radius: var(--radius-sm);
      box-shadow:
        inset 0 1px 0 var(--glass-highlight),
        0 4px 12px rgba(47, 64, 87, 0.13);
    }

    .ratio-grid button.active,
    .preset-grid button.active,
    .batch-item.active,
    .template-item.active {
      border-color: color-mix(in srgb, var(--accent) 52%, var(--line));
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    input[type="range"]::-webkit-slider-runnable-track,
    input[type="range"]::-moz-range-track {
      height: 5px;
      background: color-mix(in srgb, var(--line-strong) 74%, transparent);
      box-shadow: inset 0 1px 2px rgba(52, 68, 90, 0.12);
    }

    input[type="range"]::-webkit-slider-thumb,
    input[type="range"]::-moz-range-thumb {
      border-color: rgba(255, 255, 255, 0.9);
      background: var(--accent);
      box-shadow: 0 2px 9px color-mix(in srgb, var(--accent) 36%, transparent);
    }

    .value-chip {
      min-width: 48px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: color-mix(in srgb, var(--surface-3) 72%, transparent);
      box-shadow: inset 0 1px 0 var(--glass-highlight);
      color: var(--ink);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
    }

    .metric,
    .batch-summary,
    .batch-item,
    .template-item {
      border-radius: var(--radius-sm);
    }

    select:focus-visible,
    input:not([type="range"]):focus-visible {
      border-color: color-mix(in srgb, var(--accent) 62%, var(--line));
      box-shadow:
        0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent),
        inset 0 1px 0 var(--glass-highlight);
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .workspace {
        grid-template-rows: auto minmax(420px, 58vh);
      }

      .side-panel {
        position: static;
        max-height: none;
        overflow: visible;
      }
    }

    @media (max-width: 620px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        top: 8px;
        margin: 8px 10px 0;
        padding: 12px 12px 13px;
        border-radius: 20px;
      }

      .top-actions {
        width: 100%;
      }

      .top-actions .btn,
      .button-row .btn {
        flex: 1 1 150px;
      }

      .layout {
        gap: 10px;
        padding: 10px;
      }

      .workspace {
        grid-template-rows: auto minmax(360px, 62vh);
      }

      .workspace,
      .side-panel {
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.1) 48%, rgba(255, 255, 255, 0.24)),
          color-mix(in srgb, var(--bg-top) 92%, transparent);
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        border-radius: 20px;
      }

      .toolbar {
        align-items: flex-start;
        gap: 10px;
        padding: 10px;
      }

      .toolbar-group {
        width: 100%;
      }

      .toolbar-group:last-child {
        justify-content: flex-end;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .watermark-options {
        grid-template-columns: 1fr;
      }

      .status {
        max-width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    @media (prefers-reduced-transparency: reduce) {
      .topbar,
      .empty-box,
      .workspace,
      .side-panel {
        background: var(--surface);
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">C</div>
        <div>
          <h1>本地图片裁剪</h1>
          <p class="status" id="statusText">选择图片后开始编辑，所有处理都在本机完成。</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="btn primary" id="uploadBtn" type="button" title="选择图片">
          <span aria-hidden="true">↑</span>
          选择图片
        </button>
        <button class="btn" id="exportBtnTop" type="button" title="导出裁剪结果" disabled>
          <span aria-hidden="true">↓</span>
          导出
        </button>
      </div>
    </header>

    <main class="layout">
      <section class="workspace" aria-label="裁剪工作区">
        <div class="toolbar">
          <div class="toolbar-group" aria-label="编辑模式">
            <div class="segmented" id="modeButtons">
              <button type="button" data-mode="crop" class="active" title="调整裁剪框">
                <span aria-hidden="true">□</span>
                裁剪框
              </button>
              <button type="button" data-mode="move" title="移动图片">
                <span aria-hidden="true">↔</span>
                移动图片
              </button>
            </div>
          </div>
          <div class="toolbar-group" aria-label="快捷操作">
            <button class="icon-btn" id="undoBtn" type="button" title="撤销" disabled aria-label="撤销">↺</button>
            <button class="icon-btn" id="redoBtn" type="button" title="重做" disabled aria-label="重做">↻</button>
            <button class="icon-btn" id="rotateLeftBtn" type="button" title="向左旋转 90 度" disabled aria-label="向左旋转 90 度">↶</button>
            <button class="icon-btn" id="rotateRightBtn" type="button" title="向右旋转 90 度" disabled aria-label="向右旋转 90 度">↷</button>
            <button class="btn" id="fitBtn" type="button" title="适合屏幕" disabled>
              <span aria-hidden="true">⌖</span>
              适合
            </button>
            <button class="btn warn" id="resetBtn" type="button" title="重置图片和裁剪框" disabled>
              <span aria-hidden="true">↺</span>
              重置
            </button>
          </div>
        </div>

        <div class="stage" id="stage">
          <canvas id="editorCanvas" aria-label="图片裁剪画布"></canvas>
          <div class="empty-state" id="emptyState">
            <div class="empty-box">
              <p class="empty-title">拖入图片</p>
              <p class="empty-copy">支持 PNG、JPEG、WebP、GIF 静态帧等浏览器可读取格式。</p>
              <button class="btn primary" id="emptyUploadBtn" type="button">
                <span aria-hidden="true">↑</span>
                选择图片
              </button>
            </div>
          </div>
        </div>
      </section>

      <aside class="side-panel" aria-label="裁剪设置">
        <section class="panel-section">
          <h2 class="section-title">预览</h2>
          <div class="preview-shell">
            <canvas id="previewCanvas" aria-label="裁剪预览"></canvas>
          </div>
          <div class="meta-grid">
            <div class="metric">
              <span>输出尺寸</span>
              <strong id="sizeText">-</strong>
            </div>
            <div class="metric">
              <span>原图</span>
              <strong id="sourceText">-</strong>
            </div>
          </div>
        </section>

        <section class="panel-section">
          <h2 class="section-title">批量</h2>
          <div class="batch-summary">
            <span id="batchCountText">未加入队列</span>
            <span id="batchActiveText">-</span>
          </div>
          <div class="batch-list" id="batchList" aria-label="批量图片队列"></div>
          <div class="button-row batch-actions">
            <button class="btn" id="prevBatchBtn" type="button" disabled>上一张</button>
            <button class="btn" id="nextBatchBtn" type="button" disabled>下一张</button>
            <button class="btn" id="clearBatchBtn" type="button" disabled>清空队列</button>
          </div>
        </section>

        <section class="panel-section">
          <h2 class="section-title">比例</h2>
          <div class="ratio-grid" id="ratioButtons">
            <button type="button" data-ratio="free" class="active">自由</button>
            <button type="button" data-ratio="1:1">1:1</button>
            <button type="button" data-ratio="4:3">4:3</button>
            <button type="button" data-ratio="16:9">16:9</button>
            <button type="button" data-ratio="3:4">3:4</button>
            <button type="button" data-ratio="9:16">9:16</button>
          </div>
        </section>

        <section class="panel-section">
          <h2 class="section-title">尺寸</h2>
          <div class="preset-grid" id="presetButtons">
            <button type="button" data-preset="800x800">头像 800x800</button>
            <button type="button" data-preset="900x383">公众号 900x383</button>
            <button type="button" data-preset="1242x1660">小红书 3:4</button>
            <button type="button" data-preset="1080x1920">竖屏 9:16</button>
            <button type="button" data-preset="1920x1080">横屏 16:9</button>
            <button type="button" data-preset="1200x1200">方图 1200</button>
          </div>
          <div class="control" style="margin-top: 14px;">
            <div class="size-fields">
              <div class="number-field">
                <label for="widthInput">宽度 px</label>
                <input id="widthInput" type="number" min="1" step="1" inputmode="numeric" disabled>
              </div>
              <div class="number-field">
                <label for="heightInput">高度 px</label>
                <input id="heightInput" type="number" min="1" step="1" inputmode="numeric" disabled>
              </div>
            </div>
          </div>
          <label class="check-row" for="lockRatioInput">
            <input id="lockRatioInput" type="checkbox" checked>
            锁定当前宽高比例
          </label>
          <div class="button-row" style="margin-top: 12px;">
            <button class="btn" id="applySizeBtn" type="button" disabled>应用尺寸</button>
          </div>
        </section>

        <section class="panel-section">
          <h2 class="section-title">模板</h2>
          <div class="template-save">
            <input id="templateNameInput" type="text" maxlength="18" placeholder="模板名称，如 商品主图" disabled>
            <button class="btn" id="saveTemplateBtn" type="button" disabled>保存</button>
          </div>
          <div class="template-list" id="templateList" aria-label="自定义尺寸模板"></div>
        </section>

        <section class="panel-section">
          <h2 class="section-title">图片</h2>
          <div class="control">
            <label for="zoomRange">缩放</label>
            <div class="range-row">
              <input id="zoomRange" type="range" min="25" max="300" value="100" step="1" disabled>
              <span class="value-chip" id="zoomValue">100%</span>
            </div>
          </div>
          <p class="kbd-hint">切到“移动图片”后拖动画布，可调整图片在裁剪框里的位置。</p>
        </section>

        <section class="panel-section">
          <div class="section-heading-row">
            <h2 class="section-title">基础调色</h2>
            <button class="btn compact-btn" id="resetAdjustmentsBtn" type="button" disabled>重置调色</button>
          </div>
          <div class="adjustment-stack">
            <div class="control">
              <label for="brightnessRange">亮度</label>
              <div class="range-row">
                <input id="brightnessRange" type="range" min="-100" max="100" value="0" step="1" disabled>
                <span class="value-chip" id="brightnessValue">0</span>
              </div>
            </div>
            <div class="control">
              <label for="contrastRange">对比度</label>
              <div class="range-row">
                <input id="contrastRange" type="range" min="-100" max="100" value="0" step="1" disabled>
                <span class="value-chip" id="contrastValue">0</span>
              </div>
            </div>
            <div class="control">
              <label for="saturationRange">饱和度</label>
              <div class="range-row">
                <input id="saturationRange" type="range" min="-100" max="100" value="0" step="1" disabled>
                <span class="value-chip" id="saturationValue">0</span>
              </div>
            </div>
            <div class="control">
              <label for="sharpenRange">锐化</label>
              <div class="range-row">
                <input id="sharpenRange" type="range" min="0" max="100" value="0" step="1" disabled>
                <span class="value-chip" id="sharpenValue">0</span>
              </div>
            </div>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-heading-row">
            <h2 class="section-title">水印</h2>
            <button class="btn compact-btn" id="resetWatermarkBtn" type="button" disabled>清除水印</button>
          </div>
          <div class="control">
            <label for="watermarkTypeSelect">类型</label>
            <select id="watermarkTypeSelect" disabled>
              <option value="none">无水印</option>
              <option value="text">文字水印</option>
              <option value="image">图片水印</option>
            </select>
          </div>
          <div class="watermark-source" id="textWatermarkControls" hidden>
            <label class="inline-label" for="watermarkTextInput">水印文字</label>
            <input class="text-field" id="watermarkTextInput" type="text" maxlength="80" placeholder="输入水印文字" disabled>
          </div>
          <div class="watermark-source" id="imageWatermarkControls" hidden>
            <span class="inline-label">水印图片</span>
            <div class="watermark-upload-row">
              <span class="watermark-file-name" id="watermarkFileName">尚未选择图片</span>
              <button class="btn compact-btn" id="watermarkUploadBtn" type="button" disabled>选择图片</button>
            </div>
          </div>
          <div class="watermark-options">
            <div class="control">
              <label for="watermarkPositionSelect">位置</label>
              <select id="watermarkPositionSelect" disabled>
                <option value="top-left">左上</option>
                <option value="top-center">顶部居中</option>
                <option value="top-right">右上</option>
                <option value="center-left">左侧居中</option>
                <option value="center">正中</option>
                <option value="center-right">右侧居中</option>
                <option value="bottom-left">左下</option>
                <option value="bottom-center">底部居中</option>
                <option value="bottom-right" selected>右下</option>
              </select>
            </div>
            <div class="control">
              <label for="watermarkOpacityRange">透明度</label>
              <div class="range-row">
                <input id="watermarkOpacityRange" type="range" min="5" max="100" value="65" step="1" disabled>
                <span class="value-chip" id="watermarkOpacityValue">65%</span>
              </div>
            </div>
          </div>
          <div class="control" style="margin-top: 14px;">
            <label for="watermarkSizeRange">大小</label>
            <div class="range-row">
              <input id="watermarkSizeRange" type="range" min="6" max="48" value="20" step="1" disabled>
              <span class="value-chip" id="watermarkSizeValue">20%</span>
            </div>
          </div>
        </section>

        <section class="panel-section">
          <h2 class="section-title">导出</h2>
          <div class="control">
            <label for="formatSelect">格式</label>
            <select id="formatSelect">
              <option value="image/png">PNG</option>
              <option value="image/jpeg">JPEG</option>
              <option value="image/webp">WebP</option>
            </select>
          </div>
          <div class="control">

    const state = {
      image: null,

      zoom: 1,
      mode: "crop",
      aspectKey: "free",
      aspect: null,
      canvas: { width: 0, height: 0, dpr: 1 },
      view: { x: 0, y: 0, scale: 1 },
      crop: null,
      drag: null,
      batch: [],
      activeBatchId: null,
      batchExporting: false,
      adjustments: {
        brightness: 0,

    const history = {
