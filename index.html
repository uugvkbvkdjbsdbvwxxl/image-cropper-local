    const HANDLE_SIZE = 13;
    const MIN_CROP = 34;
    const HISTORY_LIMIT = 80;
    const TEMPLATE_STORAGE_KEY = "localImageCropper.templates.v1";
    const BATCH_DELAY_MS = 160;
    const DEFAULT_ADJUSTMENTS = Object.freeze({
      brightness: 0,
      contrast: 0,
      saturation: 0,
      sharpen: 0
    });
    const DEFAULT_WATERMARK = Object.freeze({
      type: "none",
      text: "",
      image: null,
      imageName: "",
      opacity: 65,
      position: "bottom-right",
      size: 20
    });
    const ratios = {
      "free": null,
      "1:1": 1,
      "4:3": 4 / 3,
      "16:9": 16 / 9,
      "3:4": 3 / 4,
      "9:16": 9 / 16
    };

    const presets = {
      "800x800": { width: 800, height: 800, label: "头像" },
      "900x383": { width: 900, height: 383, label: "公众号" },
      "1242x1660": { width: 1242, height: 1660, label: "小红书" },
      "1080x1920": { width: 1080, height: 1920, label: "竖屏" },
      "1920x1080": { width: 1920, height: 1080, label: "横屏" },
      "1200x1200": { width: 1200, height: 1200, label: "方图" }
    };
    let customTemplates = [];

    function clamp(value, min, max) {
      if (max < min) return min;
      return Math.min(Math.max(value, min), max);
    }

    function cloneAdjustments() {
      return { ...state.adjustments };
    }

    function cloneWatermark() {
      return { ...state.watermark };
    }

    function adjustmentFilter() {
      const brightness = clamp(100 + Number(state.adjustments.brightness), 0, 200);
      const contrast = clamp(100 + Number(state.adjustments.contrast), 0, 200);
      const saturation = clamp(100 + Number(state.adjustments.saturation), 0, 200);
      return `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%)`;
    }

    function drawAdjustedImage(targetCtx, ...args) {
      targetCtx.save();
      targetCtx.filter = adjustmentFilter();
      targetCtx.imageSmoothingEnabled = true;
      targetCtx.imageSmoothingQuality = "high";
      targetCtx.drawImage(...args);
      targetCtx.restore();
    }

    function applySharpenToContext(targetCtx, x, y, width, height) {
      const amount = clamp(Number(state.adjustments.sharpen) / 100, 0, 1) * 0.72;
      if (!amount || width < 3 || height < 3) return;

      const canvasWidth = targetCtx.canvas.width;
      const canvasHeight = targetCtx.canvas.height;
      const sx = clamp(Math.floor(x), 0, Math.max(0, canvasWidth - 1));
      const sy = clamp(Math.floor(y), 0, Math.max(0, canvasHeight - 1));
      const sw = clamp(Math.ceil(width), 1, canvasWidth - sx);
      const sh = clamp(Math.ceil(height), 1, canvasHeight - sy);
      if (sw < 3 || sh < 3) return;

      let imageData;
      try {
        imageData = targetCtx.getImageData(sx, sy, sw, sh);
      } catch (error) {
        return;
      }
      const pixels = imageData.data;
      const source = new Uint8ClampedArray(pixels);
      const centerWeight = 1 + amount * 4;

      for (let row = 1; row < sh - 1; row += 1) {
        for (let column = 1; column < sw - 1; column += 1) {
          const index = (row * sw + column) * 4;
          const left = index - 4;
          const right = index + 4;
          const above = index - sw * 4;
          const below = index + sw * 4;
          if (source[index + 3] < 250 || source[left + 3] < 250 || source[right + 3] < 250 ||
            source[above + 3] < 250 || source[below + 3] < 250) continue;
          for (let channel = 0; channel < 3; channel += 1) {
            pixels[index + channel] = clamp(
              source[index + channel] * centerWeight - amount * (
                source[left + channel] + source[right + channel] +
                source[above + channel] + source[below + channel]
              ),
              0,
              255
            );
          }
        }
      }
      targetCtx.putImageData(imageData, sx, sy);
    }

    function hasRenderableWatermark() {
      if (state.watermark.type === "text") return Boolean(state.watermark.text.trim());
      if (state.watermark.type === "image") return Boolean(state.watermark.image);
      return false;
    }

    function positionWatermarkBox(rect, width, height) {
      const position = state.watermark.position;
      const padding = Math.max(6, Math.min(rect.width, rect.height) * 0.035);
      const vertical = position.startsWith("top")
        ? "top"
        : position.startsWith("bottom")
          ? "bottom"
          : "center";
      const horizontal = position.endsWith("left")
        ? "left"
        : position.endsWith("right")
          ? "right"
          : "center";
      let x = rect.x + (rect.width - width) / 2;
      let y = rect.y + (rect.height - height) / 2;
      if (horizontal === "left") x = rect.x + padding;
      if (horizontal === "right") x = rect.x + rect.width - width - padding;
      if (vertical === "top") y = rect.y + padding;
      if (vertical === "bottom") y = rect.y + rect.height - height - padding;
      return { x, y };
    }

    function drawWatermark(targetCtx, rect) {
      if (!hasRenderableWatermark() || rect.width <= 0 || rect.height <= 0) return;
      targetCtx.save();
      targetCtx.beginPath();
      targetCtx.rect(rect.x, rect.y, rect.width, rect.height);
      targetCtx.clip();
      targetCtx.globalAlpha = clamp(Number(state.watermark.opacity) / 100, 0.05, 1);

      if (state.watermark.type === "image") {
        const image = state.watermark.image;
        const ratio = image.naturalWidth / image.naturalHeight || 1;
        let width = rect.width * clamp(Number(state.watermark.size), 6, 48) / 100;
        let height = width / ratio;
        const maxHeight = rect.height * 0.72;
        if (height > maxHeight) {
          height = maxHeight;
          width = height * ratio;
        }
        const position = positionWatermarkBox(rect, width, height);
        targetCtx.imageSmoothingEnabled = true;
        targetCtx.imageSmoothingQuality = "high";
        targetCtx.drawImage(image, position.x, position.y, width, height);
      } else {
        const text = state.watermark.text.trim();
        let fontSize = clamp(
          rect.width * clamp(Number(state.watermark.size), 6, 48) / 100 * 0.45,
          10,
          rect.height * 0.28
        );
        const fontFamily = '"Segoe UI Variable", "Microsoft YaHei UI", sans-serif';
        targetCtx.font = `700 ${fontSize}px ${fontFamily}`;
        const maxWidth = rect.width * 0.82;
        const measured = targetCtx.measureText(text).width;
        if (measured > maxWidth) {
          fontSize = Math.max(8, fontSize * maxWidth / measured);
          targetCtx.font = `700 ${fontSize}px ${fontFamily}`;
        }
        const width = Math.min(maxWidth, targetCtx.measureText(text).width);
        const height = fontSize * 1.2;
        const position = positionWatermarkBox(rect, width, height);
        targetCtx.textAlign = "left";
        targetCtx.textBaseline = "top";
        targetCtx.lineJoin = "round";
        targetCtx.lineWidth = Math.max(1, fontSize * 0.08);
        targetCtx.strokeStyle = "rgba(0, 0, 0, 0.58)";
        targetCtx.fillStyle = "rgba(255, 255, 255, 0.98)";
        targetCtx.strokeText(text, position.x, position.y, maxWidth);
        targetCtx.fillText(text, position.x, position.y, maxWidth);
      }
      targetCtx.restore();
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes) || bytes <= 0) return "0 KB";
      if (bytes < 1024 * 1024) return `${Math.max(1, Math.round(bytes / 1024))} KB`;
      return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    }

    function safeStorageRead(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (error) {
        return fallback;
      }
    }

    function safeStorageWrite(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
        return true;
      } catch (error) {
        return false;
      }
    }

    function loadCustomTemplates() {
      const stored = safeStorageRead(TEMPLATE_STORAGE_KEY, []);
      customTemplates = Array.isArray(stored)
        ? stored
          .filter((item) => item && Number(item.width) > 0 && Number(item.height) > 0)
          .map((item) => ({
            id: String(item.id || `${Date.now()}-${Math.random()}`),
            name: String(item.name || "自定义模板").slice(0, 18),
            width: Math.round(Number(item.width)),
            height: Math.round(Number(item.height))
          }))
        : [];
    }

    function saveCustomTemplates() {
      return safeStorageWrite(TEMPLATE_STORAGE_KEY, customTemplates);
    }

    function renderTemplateList() {
      if (!templateList) return;
      templateList.textContent = "";
      if (!customTemplates.length) {
        const empty = document.createElement("div");
        empty.className = "template-empty";
        empty.textContent = "暂无自定义模板。输入名称后保存当前宽高。";
        templateList.appendChild(empty);
        return;
      }

      customTemplates.forEach((template) => {
        const row = document.createElement("div");
        row.className = "template-item";
        row.dataset.templateId = template.id;

        const label = document.createElement("button");
        label.type = "button";
        label.className = "template-name";
        label.textContent = `${template.name} ${template.width}x${template.height}`;
        label.addEventListener("click", () => applyTemplate(template.id));

        const remove = document.createElement("button");
        remove.type = "button";
        remove.textContent = "删除";
        remove.addEventListener("click", () => removeTemplate(template.id));

        row.append(label, remove);
        templateList.appendChild(row);
      });
    }

    function saveCurrentTemplate() {
      const width = parseDimension(widthInput);
      const height = parseDimension(heightInput);
      const name = templateNameInput.value.trim() || `${width}x${height}`;
      if (!width || !height) {
        setStatus("请先设置有效的宽高再保存模板。");
        return;
      }
      const template = {
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        name: name.slice(0, 18),
        width,
        height
      };
      customTemplates = [template, ...customTemplates].slice(0, 12);
      if (!saveCustomTemplates()) {
        setStatus("模板保存失败，浏览器可能限制了本地存储。");
        return;
      }
      templateNameInput.value = "";
      renderTemplateList();
      setStatus(`已保存模板：${template.name} ${width} x ${height}px。`);
    }

    function applyTemplate(id) {
      const template = customTemplates.find((item) => item.id === id);
      if (!template) return;
      widthInput.value = String(template.width);
      heightInput.value = String(template.height);
      if (!state.bitmap) {
        setStatus("请先选择图片，再应用模板。");
        return;
      }
      setActivePreset("");
      const applied = applyOutputSize(template.width, template.height, template.name);
      if (!applied && state.bitmap) {
        applyAspectMax(template.width / template.height, template.name);
      }
    }

    function removeTemplate(id) {
      customTemplates = customTemplates.filter((item) => item.id !== id);
      saveCustomTemplates();
      renderTemplateList();
      setStatus("已删除模板。");
    }

    function createBatchItem(file) {
      return {
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        file,
        name: file.name || "image",
        size: file.size || 0
      };
    }

    function activeBatchIndex() {
      return state.batch.findIndex((item) => item.id === state.activeBatchId);
    }

    function renderBatchList() {
      if (!batchList) return;
      const count = state.batch.length;
      const activeIndex = activeBatchIndex();
      batchCountText.textContent = count ? `${count} 张图片` : "未加入队列";
      batchActiveText.textContent = activeIndex >= 0 ? `${activeIndex + 1}/${count}` : "-";
      prevBatchBtn.disabled = count <= 1 || activeIndex <= 0 || state.batchExporting;
      nextBatchBtn.disabled = count <= 1 || activeIndex < 0 || activeIndex >= count - 1 || state.batchExporting;
      clearBatchBtn.disabled = count === 0 || state.batchExporting;
      batchExportBtn.disabled = count === 0 || !state.bitmap || state.batchExporting;

      batchList.textContent = "";
      if (!count) return;

      state.batch.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = `batch-item${item.id === state.activeBatchId ? " active" : ""}`;

        const name = document.createElement("button");
        name.type = "button";
        name.className = "batch-name";
        name.textContent = `${index + 1}. ${item.name}`;
        name.title = `${item.name} (${formatBytes(item.size)})`;
        name.disabled = state.batchExporting;
        name.addEventListener("click", () => loadBatchItem(item.id));

        const size = document.createElement("span");
        size.textContent = formatBytes(item.size);
        size.style.color = "var(--muted)";

        row.append(name, size);
        batchList.appendChild(row);
      });
    }

    function addFiles(fileList) {
      const files = Array.from(fileList || []).filter((file) => file && file.type.startsWith("image/"));
      if (!files.length) {
        setStatus("请选择浏览器支持的图片文件。");
        return;
      }
      const items = files.map(createBatchItem);
      state.batch.push(...items);
      renderBatchList();
      loadBatchItem(items[0].id);
      setStatus(files.length > 1 ? `已加入 ${files.length} 张图片。` : `已加入：${items[0].name}`);
    }

    async function loadBatchItem(id) {
      const item = state.batch.find((entry) => entry.id === id);
      if (!item || state.batchExporting) return false;
      state.activeBatchId = id;
      renderBatchList();
      return loadFile(item.file, { batchId: id });
    }

    function loadAdjacentBatch(delta) {
      const index = activeBatchIndex();
      const next = state.batch[index + delta];
      if (next) loadBatchItem(next.id);
    }

    function clearBatch() {
      state.batch = [];
      state.activeBatchId = null;
      renderBatchList();
      setStatus("已清空批量队列。");
    }

    function snapshotEditor() {
      if (!state.bitmap || !state.crop) return null;
      return {
        rotation: state.rotation,
        zoom: state.zoom,
        aspectKey: state.aspectKey,
        aspect: state.aspect,
        view: { ...state.view },
        crop: { ...state.crop },
        adjustments: cloneAdjustments(),
        watermark: cloneWatermark()
      };
    }

    function serializeSnapshot(snapshot) {
      return JSON.stringify({
        rotation: snapshot.rotation,
        zoom: Number(snapshot.zoom.toFixed(5)),
        aspectKey: snapshot.aspectKey,
        aspect: snapshot.aspect === null ? null : Number(snapshot.aspect.toFixed(8)),
        view: {
          x: Number(snapshot.view.x.toFixed(3)),
          y: Number(snapshot.view.y.toFixed(3)),
          scale: Number(snapshot.view.scale.toFixed(6))
        },
        crop: {
          x: Number(snapshot.crop.x.toFixed(3)),
          y: Number(snapshot.crop.y.toFixed(3)),
          w: Number(snapshot.crop.w.toFixed(3)),
          h: Number(snapshot.crop.h.toFixed(3))
        },
        adjustments: snapshot.adjustments,
        watermark: {
          type: snapshot.watermark.type,
          text: snapshot.watermark.text,
          imageName: snapshot.watermark.imageName,
          hasImage: Boolean(snapshot.watermark.image),
          opacity: snapshot.watermark.opacity,
          position: snapshot.watermark.position,
          size: snapshot.watermark.size
        }
      });
    }

    function updateHistoryControls() {
      undoBtn.disabled = history.undo.length <= 1;
      redoBtn.disabled = history.redo.length === 0;
    }

    function clearHistory() {
      history.undo = [];
      history.redo = [];
      history.lastKey = "";
      history.restoring = false;
      updateHistoryControls();
    }

    function commitHistory() {
      if (history.restoring) return;
      const snapshot = snapshotEditor();
      if (!snapshot) {
        updateHistoryControls();
        return;
      }
      const key = serializeSnapshot(snapshot);
      if (key === history.lastKey) {
        updateHistoryControls();
        return;
      }
      history.undo.push(snapshot);
      if (history.undo.length > HISTORY_LIMIT) history.undo.shift();
      history.redo = [];
      history.lastKey = key;
      updateHistoryControls();
    }

    function syncRatioButtons() {
      ratioButtons.querySelectorAll("button").forEach((button) => {
        button.classList.toggle("active", button.dataset.ratio === state.aspectKey);
      });
    }

    function setActivePreset(key) {
      presetButtons.querySelectorAll("button").forEach((button) => {
        button.classList.toggle("active", button.dataset.preset === key);
      });
    }

    function restoreSnapshot(snapshot) {
      if (!snapshot || !state.image) return;
      history.restoring = true;
      state.rotation = snapshot.rotation;
      buildRotatedBitmap();
      state.zoom = snapshot.zoom;
      state.aspectKey = snapshot.aspectKey;
      state.aspect = snapshot.aspect;
      state.view = { ...snapshot.view };
      state.crop = { ...snapshot.crop };
      state.adjustments = { ...DEFAULT_ADJUSTMENTS, ...snapshot.adjustments };
      state.watermark = { ...DEFAULT_WATERMARK, ...snapshot.watermark };
      zoomRange.value = String(Math.round(state.zoom * 100));
      zoomValue.textContent = `${Math.round(state.zoom * 100)}%`;
      syncRatioButtons();
      syncEffectControls();
      setActivePreset("");
      render();
      history.lastKey = serializeSnapshot(snapshot);
      history.restoring = false;
      updateHistoryControls();
    }

    function undoEdit() {
      if (history.undo.length <= 1) return;
      const current = history.undo.pop();
      history.redo.push(current);
      const previous = history.undo[history.undo.length - 1];
      restoreSnapshot(previous);
      setStatus("已撤销。");
    }

    function redoEdit() {
      if (!history.redo.length) return;
      const next = history.redo.pop();
      history.undo.push(next);
      restoreSnapshot(next);
      setStatus("已重做。");
    }

    function setStatus(message) {
      statusText.textContent = message;
    }

    function imageRect() {
      if (!state.bitmap) return { x: 0, y: 0, w: 0, h: 0 };
      return {
        x: state.view.x,
        y: state.view.y,
        w: state.bitmap.width * state.view.scale,
        h: state.bitmap.height * state.view.scale
      };
    }

    function canvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function pointInRect(point, rect) {
      return point.x >= rect.x && point.x <= rect.x + rect.w &&
        point.y >= rect.y && point.y <= rect.y + rect.h;
    }

    function calculateFitScale() {
      if (!state.bitmap || !state.canvas.width || !state.canvas.height) return 1;
      const pad = state.canvas.width < 620 ? 22 : 40;
      return Math.max(0.02, Math.min(
        (state.canvas.width - pad) / state.bitmap.width,
        (state.canvas.height - pad) / state.bitmap.height
      ));
    }

    function centerImage() {
      const scale = calculateFitScale() * state.zoom;
      state.view.scale = scale;
      state.view.x = (state.canvas.width - state.bitmap.width * scale) / 2;
      state.view.y = (state.canvas.height - state.bitmap.height * scale) / 2;
    }

    function fitAspectInside(width, height, aspect) {
      if (!aspect) return { w: width, h: height };
      let w = width;
      let h = w / aspect;
      if (h > height) {
        h = height;
        w = h * aspect;
      }
      return { w, h };
    }

    function makeCenteredCrop(rect, fill = 0.72) {
      const maxW = Math.max(MIN_CROP, rect.w * fill);
      const maxH = Math.max(MIN_CROP, rect.h * fill);
      const size = fitAspectInside(maxW, maxH, state.aspect);
      return {
        x: rect.x + (rect.w - size.w) / 2,
        y: rect.y + (rect.h - size.h) / 2,
        w: size.w,
        h: size.h
      };
    }

    function clampCropToImage(rect) {
      const bounds = imageRect();
      const crop = { ...rect };
      crop.w = clamp(crop.w, Math.min(MIN_CROP, bounds.w), bounds.w);
      crop.h = clamp(crop.h, Math.min(MIN_CROP, bounds.h), bounds.h);
      crop.x = clamp(crop.x, bounds.x, bounds.x + bounds.w - crop.w);
      crop.y = clamp(crop.y, bounds.y, bounds.y + bounds.h - crop.h);
      return crop;
    }

    function ensureCropFitsImage() {
      if (!state.crop) return;
      const bounds = imageRect();
      if (state.crop.w <= bounds.w && state.crop.h <= bounds.h) {
        state.crop = clampCropToImage(state.crop);
        return;
      }
      const center = {
        x: state.crop.x + state.crop.w / 2,
        y: state.crop.y + state.crop.h / 2
      };
      const size = fitAspectInside(bounds.w * 0.92, bounds.h * 0.92, state.aspect);
      state.crop = clampCropToImage({
        x: center.x - size.w / 2,
        y: center.y - size.h / 2,
        w: size.w,
        h: size.h
      });
    }

    function constrainImageToCrop() {
      if (!state.bitmap || !state.crop) return;
      const iw = state.bitmap.width * state.view.scale;
      const ih = state.bitmap.height * state.view.scale;
      if (iw <= state.crop.w) {
        state.view.x = state.crop.x + (state.crop.w - iw) / 2;
      } else {
        if (state.view.x > state.crop.x) state.view.x = state.crop.x;
        if (state.view.x + iw < state.crop.x + state.crop.w) {
          state.view.x = state.crop.x + state.crop.w - iw;
        }
      }
      if (ih <= state.crop.h) {
        state.view.y = state.crop.y + (state.crop.h - ih) / 2;
      } else {
        if (state.view.y > state.crop.y) state.view.y = state.crop.y;
        if (state.view.y + ih < state.crop.y + state.crop.h) {
          state.view.y = state.crop.y + state.crop.h - ih;
        }
      }
    }

    function resetViewAndCrop() {
      if (!state.bitmap) return;
      centerImage();
      state.crop = makeCenteredCrop(imageRect());
      constrainImageToCrop();
      render();
    }

    function buildRotatedBitmap() {
      const source = state.image;
      const turns = ((state.rotation % 360) + 360) % 360;
      const canvasBitmap = document.createElement("canvas");
      const swap = turns === 90 || turns === 270;
      canvasBitmap.width = swap ? source.naturalHeight : source.naturalWidth;
      canvasBitmap.height = swap ? source.naturalWidth : source.naturalHeight;
      const bitmapCtx = canvasBitmap.getContext("2d");
      bitmapCtx.imageSmoothingEnabled = false;

      bitmapCtx.save();
      if (turns === 90) {
        bitmapCtx.translate(canvasBitmap.width, 0);
        bitmapCtx.rotate(Math.PI / 2);
      } else if (turns === 180) {
        bitmapCtx.translate(canvasBitmap.width, canvasBitmap.height);
        bitmapCtx.rotate(Math.PI);
      } else if (turns === 270) {
        bitmapCtx.translate(0, canvasBitmap.height);
        bitmapCtx.rotate(-Math.PI / 2);
      }
      bitmapCtx.drawImage(source, 0, 0);
      bitmapCtx.restore();
      state.bitmap = canvasBitmap;
    }

    function syncAdjustmentControls() {
      const enabled = Boolean(state.bitmap);
      const controls = [brightnessRange, contrastRange, saturationRange, sharpenRange];
      controls.forEach((control) => {
        control.disabled = !enabled;
      });
      resetAdjustmentsBtn.disabled = !enabled;
      brightnessRange.value = String(state.adjustments.brightness);
      contrastRange.value = String(state.adjustments.contrast);
      saturationRange.value = String(state.adjustments.saturation);
      sharpenRange.value = String(state.adjustments.sharpen);
      brightnessValue.textContent = Number(state.adjustments.brightness) > 0
        ? `+${state.adjustments.brightness}`
        : String(state.adjustments.brightness);
      contrastValue.textContent = Number(state.adjustments.contrast) > 0
        ? `+${state.adjustments.contrast}`
        : String(state.adjustments.contrast);
      saturationValue.textContent = Number(state.adjustments.saturation) > 0
        ? `+${state.adjustments.saturation}`
        : String(state.adjustments.saturation);
      sharpenValue.textContent = String(state.adjustments.sharpen);
    }

    function syncWatermarkControls() {
      const enabled = Boolean(state.bitmap);
      const active = enabled && state.watermark.type !== "none";
      watermarkTypeSelect.disabled = !enabled;
      watermarkTypeSelect.value = state.watermark.type;
      watermarkTextInput.value = state.watermark.text;
      watermarkTextInput.disabled = !enabled || state.watermark.type !== "text";
      watermarkPositionSelect.value = state.watermark.position;
      watermarkPositionSelect.disabled = !active;
      watermarkOpacityRange.value = String(state.watermark.opacity);
      watermarkOpacityRange.disabled = !active;
      watermarkOpacityValue.textContent = `${state.watermark.opacity}%`;
      watermarkSizeRange.value = String(state.watermark.size);
      watermarkSizeRange.disabled = !active;
      watermarkSizeValue.textContent = `${state.watermark.size}%`;
      watermarkUploadBtn.disabled = !enabled || state.watermark.type !== "image";
      watermarkFileName.textContent = state.watermark.imageName || "尚未选择图片";
      textWatermarkControls.hidden = state.watermark.type !== "text";
      imageWatermarkControls.hidden = state.watermark.type !== "image";
      resetWatermarkBtn.disabled = !enabled || (
        state.watermark.type === "none" && !state.watermark.text && !state.watermark.image
      );
    }

    function syncEffectControls() {
      syncAdjustmentControls();
      syncWatermarkControls();
    }

    function updateAdjustment(key, value) {
      state.adjustments[key] = Number(value);
      syncAdjustmentControls();
      render();
    }

    function resetAdjustments() {
      state.adjustments = { ...DEFAULT_ADJUSTMENTS };
      syncAdjustmentControls();
      render();
      commitHistory();
      setStatus("已重置基础调色。");
    }

    function resetWatermark() {
      state.watermark = { ...DEFAULT_WATERMARK };
      watermarkFileInput.value = "";
      syncWatermarkControls();
      render();
      commitHistory();
      setStatus("已清除水印。");
    }

    async function loadWatermarkFile(file) {
      if (!file || !file.type.startsWith("image/")) {
        setStatus("请选择 PNG、JPEG 或 WebP 水印图片。");
        return false;
      }
      return new Promise((resolve) => {
        const url = URL.createObjectURL(file);
        const image = new Image();
        image.onload = () => {
          URL.revokeObjectURL(url);
          state.watermark.image = image;
          state.watermark.imageName = file.name || "水印图片";
          state.watermark.type = "image";
          syncWatermarkControls();
          render();
          commitHistory();
          setStatus(`已载入水印：${state.watermark.imageName}`);
          resolve(true);
        };
        image.onerror = () => {
          URL.revokeObjectURL(url);
          setStatus("水印图片读取失败，请换一张试试。");
          resolve(false);
        };
        image.src = url;
      });
    }

    function updateControls(enabled) {
      [
        exportBtn,
        exportBtnTop,
        copyBtn,
        rotateLeftBtn,
        rotateRightBtn,
        resetBtn,
        fitBtn,
        zoomRange,
        widthInput,
        heightInput,
        lockRatioInput,
        applySizeBtn,
        templateNameInput,
        saveTemplateBtn,
        targetSizeToggle
      ].forEach((element) => {
        element.disabled = !enabled;
      });
      emptyState.classList.toggle("hidden", enabled);
      if (!enabled) {
        widthInput.value = "";
        heightInput.value = "";
        setActivePreset("");
      }
      updateQualityState();
      syncEffectControls();
      renderBatchList();
      renderTemplateList();
      updateHistoryControls();
    }

    async function loadFile(file, options = {}) {
      if (!file || !file.type.startsWith("image/")) {
        setStatus("请选择浏览器支持的图片文件。");
        return false;
      }

      return new Promise((resolve) => {
        const url = URL.createObjectURL(file);
        const image = new Image();
        image.onload = () => {
          URL.revokeObjectURL(url);
          state.image = image;
          state.imageName = file.name || "image";
          if (options.batchId) state.activeBatchId = options.batchId;
          state.rotation = 0;
          state.zoom = 1;
          zoomRange.value = "100";
          zoomValue.textContent = "100%";
          buildRotatedBitmap();
          updateControls(true);
          sourceText.textContent = `${image.naturalWidth} x ${image.naturalHeight}px`;
          resetViewAndCrop();
          clearHistory();
          commitHistory();
          renderBatchList();
          if (!options.silent) setStatus(`已载入：${state.imageName}`);
          resolve(true);
        };
        image.onerror = () => {
          URL.revokeObjectURL(url);
          setStatus("图片读取失败，请换一张试试。");
          resolve(false);
        };
        image.src = url;
      });
    }

    function getCropSource() {
      if (!state.bitmap || !state.crop) return null;
      const rect = imageRect();
      const sx = clamp((state.crop.x - rect.x) / state.view.scale, 0, state.bitmap.width);
      const sy = clamp((state.crop.y - rect.y) / state.view.scale, 0, state.bitmap.height);
      const ex = clamp((state.crop.x + state.crop.w - rect.x) / state.view.scale, 0, state.bitmap.width);
      const ey = clamp((state.crop.y + state.crop.h - rect.y) / state.view.scale, 0, state.bitmap.height);
      return {
        sx,
        sy,
        sw: Math.max(1, ex - sx),
        sh: Math.max(1, ey - sy)
      };
    }

    function getPixelCropSource() {
      const source = getCropSource();
      if (!source || !state.bitmap) return null;
      const sx = clamp(Math.round(source.sx), 0, state.bitmap.width - 1);
      const sy = clamp(Math.round(source.sy), 0, state.bitmap.height - 1);
      const sw = clamp(Math.round(source.sw), 1, state.bitmap.width - sx);
      const sh = clamp(Math.round(source.sh), 1, state.bitmap.height - sy);
      return {
        sx,
        sy,
        sw,
        sh
      };
    }

    function getExportScale() {
      return Number(scaleSelect.value) || 1;
    }

    function getExportSize(source) {
      const scale = getExportScale();
      return {
        width: Math.max(1, Math.round(source.sw * scale)),
        height: Math.max(1, Math.round(source.sh * scale)),
        scale
      };
    }

    function updateSizeInputs(source) {
      if (!source) return;
      if (document.activeElement === widthInput || document.activeElement === heightInput) return;
      widthInput.value = String(Math.round(source.sw));
      heightInput.value = String(Math.round(source.sh));
    }

    function parseDimension(input) {
      const value = Number(input.value);
      if (!Number.isFinite(value)) return null;
      return Math.max(1, Math.round(value));
    }

    function currentSizeRatio() {
      if (state.aspect) return state.aspect;
      const source = getPixelCropSource();
      if (source) return source.sw / source.sh;
      const width = parseDimension(widthInput);
      const height = parseDimension(heightInput);
      return width && height ? width / height : 1;
    }

    function syncLockedDimension(changedInput) {
      if (!lockRatioInput.checked) return;
      const ratio = currentSizeRatio();
      if (!ratio || !Number.isFinite(ratio)) return;
      if (changedInput === widthInput) {
        const width = parseDimension(widthInput);
        if (width) heightInput.value = String(Math.max(1, Math.round(width / ratio)));
      } else {
        const height = parseDimension(heightInput);
        if (height) widthInput.value = String(Math.max(1, Math.round(height * ratio)));
      }
    }

    function applyAspectMax(aspect, label) {
      if (!state.bitmap || !state.crop) return;
      state.aspect = aspect;
      state.aspectKey = "custom";
      syncRatioButtons();
      const bounds = imageRect();
      const center = {
        x: state.crop.x + state.crop.w / 2,
        y: state.crop.y + state.crop.h / 2
      };
      const size = fitAspectInside(bounds.w * 0.92, bounds.h * 0.92, aspect);
      state.crop = clampCropToImage({
        x: center.x - size.w / 2,
        y: center.y - size.h / 2,
        w: size.w,
        h: size.h
      });
      constrainImageToCrop();
      render();
      commitHistory();
      setStatus(`${label} 超过原图尺寸，已按比例裁剪最大区域。`);
    }

    function applyOutputSize(width, height, label = "自定义尺寸") {
      if (!state.bitmap || !state.crop) return false;
      if (width > state.bitmap.width || height > state.bitmap.height) {
        setStatus(`目标尺寸超过当前图片可用像素：最大 ${state.bitmap.width} x ${state.bitmap.height}px。`);
        return false;
      }
      state.aspect = width / height;
      state.aspectKey = "custom";
      syncRatioButtons();
      const rect = imageRect();
      const centerSource = {
        x: (state.crop.x + state.crop.w / 2 - rect.x) / state.view.scale,
        y: (state.crop.y + state.crop.h / 2 - rect.y) / state.view.scale
      };
      const sx = clamp(Math.round(centerSource.x - width / 2), 0, state.bitmap.width - width);
      const sy = clamp(Math.round(centerSource.y - height / 2), 0, state.bitmap.height - height);
      const cropW = width * state.view.scale;
      const cropH = height * state.view.scale;
      state.crop = clampCropToImage({
        x: rect.x + sx * state.view.scale,
        y: rect.y + sy * state.view.scale,
        w: cropW,
        h: cropH
      });
      constrainImageToCrop();
      render();
      commitHistory();
      setStatus(`已应用 ${label}：${width} x ${height}px。`);
      return true;
    }

    function applyPreset(key) {
      const preset = presets[key];
      if (!preset || !state.bitmap) return;
      setActivePreset(key);
      widthInput.value = String(preset.width);
      heightInput.value = String(preset.height);
      const applied = applyOutputSize(preset.width, preset.height, preset.label);
      if (!applied) {
        applyAspectMax(preset.width / preset.height, preset.label);
      }
    }

    function drawEmpty() {
      ctx.clearRect(0, 0, state.canvas.width, state.canvas.height);
      ctx.fillStyle = "rgba(255,255,255,0.28)";
      ctx.fillRect(0, 0, state.canvas.width, state.canvas.height);
      previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
      sizeText.textContent = "-";
      sourceText.textContent = "-";
    }

    function drawCropOverlay() {
      const crop = state.crop;
      const width = state.canvas.width;
      const height = state.canvas.height;
      ctx.save();
      ctx.fillStyle = "rgba(6, 9, 8, 0.5)";
      ctx.beginPath();
      ctx.rect(0, 0, width, height);
      ctx.rect(crop.x, crop.y, crop.w, crop.h);
      ctx.fill("evenodd");

      ctx.strokeStyle = "rgba(255, 255, 255, 0.58)";
      ctx.lineWidth = 1;
      for (let i = 1; i < 3; i += 1) {
        const x = crop.x + crop.w * i / 3;
        const y = crop.y + crop.h * i / 3;
        ctx.beginPath();
        ctx.moveTo(x, crop.y);
        ctx.lineTo(x, crop.y + crop.h);
        ctx.moveTo(crop.x, y);
        ctx.lineTo(crop.x + crop.w, y);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(255, 255, 255, 0.96)";
      ctx.lineWidth = 2;
      ctx.strokeRect(crop.x, crop.y, crop.w, crop.h);

      ctx.fillStyle = "#fbfcfa";
      ctx.strokeStyle = "#1f6f55";
      ctx.lineWidth = 2;
      for (const handle of getHandles(crop)) {
        ctx.beginPath();
        ctx.rect(handle.x - HANDLE_SIZE / 2, handle.y - HANDLE_SIZE / 2, HANDLE_SIZE, HANDLE_SIZE);
        ctx.fill();
        ctx.stroke();
      }
      ctx.restore();
    }

    function renderPreview() {
      const shell = previewCanvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const nextWidth = Math.max(1, Math.round(shell.width * dpr));
      const nextHeight = Math.max(1, Math.round(shell.height * dpr));
      if (previewCanvas.width !== nextWidth || previewCanvas.height !== nextHeight) {
        previewCanvas.width = nextWidth;
        previewCanvas.height = nextHeight;
      }
      previewCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      previewCtx.clearRect(0, 0, shell.width, shell.height);

      const source = getPixelCropSource();
      if (!source || !state.bitmap) return;

      const scale = Math.min(shell.width / source.sw, shell.height / source.sh);
      const dw = source.sw * scale;
      const dh = source.sh * scale;
      const dx = (shell.width - dw) / 2;
      const dy = (shell.height - dh) / 2;
      drawAdjustedImage(
        previewCtx,
        state.bitmap,
        source.sx,
        source.sy,
        source.sw,
        source.sh,
        dx,
        dy,
        dw,
        dh
      );
      applySharpenToContext(previewCtx, dx * dpr, dy * dpr, dw * dpr, dh * dpr);
      drawWatermark(previewCtx, { x: dx, y: dy, width: dw, height: dh });

      const exportSize = getExportSize(source);
      sizeText.textContent = exportSize.scale === 1
        ? `${exportSize.width} x ${exportSize.height}px`
        : `${exportSize.width} x ${exportSize.height}px (${exportSize.scale}x)`;
      updateSizeInputs(source);
    }

    function render() {
      if (!state.canvas.width || !state.canvas.height) return;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.setTransform(state.canvas.dpr, 0, 0, state.canvas.dpr, 0, 0);
      ctx.clearRect(0, 0, state.canvas.width, state.canvas.height);

      if (!state.bitmap) {
        drawEmpty();
        return;
      }

      drawAdjustedImage(
        ctx,
        state.bitmap,
        state.view.x,
        state.view.y,
        state.bitmap.width * state.view.scale,
        state.bitmap.height * state.view.scale
      );
      applySharpenToContext(
        ctx,
        state.crop.x * state.canvas.dpr,
        state.crop.y * state.canvas.dpr,
        state.crop.w * state.canvas.dpr,
        state.crop.h * state.canvas.dpr
      );
      drawWatermark(ctx, {
        x: state.crop.x,
        y: state.crop.y,
        width: state.crop.w,
        height: state.crop.h
      });
      drawCropOverlay();
      renderPreview();
    }

    function getHandles(crop) {
      const x = crop.x;
      const y = crop.y;
      const w = crop.w;
      const h = crop.h;
      return [
        { id: "nw", x, y },
        { id: "n", x: x + w / 2, y },
        { id: "ne", x: x + w, y },
        { id: "e", x: x + w, y: y + h / 2 },
        { id: "se", x: x + w, y: y + h },
        { id: "s", x: x + w / 2, y: y + h },
        { id: "sw", x, y: y + h },
        { id: "w", x, y: y + h / 2 }
      ];
    }

    function getHandleAt(point) {
      if (!state.crop) return null;
      for (const handle of getHandles(state.crop)) {
        if (Math.abs(point.x - handle.x) <= HANDLE_SIZE &&
          Math.abs(point.y - handle.y) <= HANDLE_SIZE) {
          return handle.id;
        }
      }
      return null;
    }

    function cursorForHandle(handle) {
      const cursors = {
        n: "ns-resize",
        s: "ns-resize",
        e: "ew-resize",
        w: "ew-resize",
        ne: "nesw-resize",
        sw: "nesw-resize",
        nw: "nwse-resize",
        se: "nwse-resize"
      };
      return cursors[handle] || "default";
    }

    function resizeFree(handle, point, start) {
      const bounds = imageRect();
      let left = start.x;
      let top = start.y;
      let right = start.x + start.w;
      let bottom = start.y + start.h;

      if (handle.includes("w")) left = clamp(point.x, bounds.x, right - MIN_CROP);
      if (handle.includes("e")) right = clamp(point.x, left + MIN_CROP, bounds.x + bounds.w);
      if (handle.includes("n")) top = clamp(point.y, bounds.y, bottom - MIN_CROP);
      if (handle.includes("s")) bottom = clamp(point.y, top + MIN_CROP, bounds.y + bounds.h);

      return { x: left, y: top, w: right - left, h: bottom - top };
    }

    function aspectRectFromCorner(handle, point, start) {
      const bounds = imageRect();
      const aspect = state.aspect;
      const anchorX = handle.includes("w") ? start.x + start.w : start.x;
      const anchorY = handle.includes("n") ? start.y + start.h : start.y;
      const signX = handle.includes("e") ? 1 : -1;
      const signY = handle.includes("s") ? 1 : -1;

      let desiredW = Math.max(MIN_CROP, Math.abs(point.x - anchorX));
      let desiredH = Math.max(MIN_CROP / aspect, desiredW / aspect);
      const pointerH = Math.abs(point.y - anchorY);
      if (pointerH > MIN_CROP && pointerH < desiredH) {
        desiredH = pointerH;
        desiredW = desiredH * aspect;
      }

      const maxW = signX > 0 ? bounds.x + bounds.w - anchorX : anchorX - bounds.x;
      const maxH = signY > 0 ? bounds.y + bounds.h - anchorY : anchorY - bounds.y;
      desiredW = Math.min(desiredW, maxW, maxH * aspect);
      desiredH = desiredW / aspect;
      desiredW = Math.max(Math.min(desiredW, maxW), Math.min(MIN_CROP, maxW));
      desiredH = Math.max(Math.min(desiredH, maxH), Math.min(MIN_CROP / aspect, maxH));

      return {
        x: signX > 0 ? anchorX : anchorX - desiredW,
        y: signY > 0 ? anchorY : anchorY - desiredH,
        w: desiredW,
        h: desiredH
      };
    }

    function aspectRectFromEdge(handle, point, start) {
      const bounds = imageRect();
      const aspect = state.aspect;
      const centerX = start.x + start.w / 2;
      const centerY = start.y + start.h / 2;
      let x = start.x;
      let y = start.y;
      let w = start.w;
      let h = start.h;

      if (handle === "e" || handle === "w") {
        if (handle === "e") {
          x = start.x;
          w = clamp(point.x - x, MIN_CROP, bounds.x + bounds.w - x);
        } else {
          const right = start.x + start.w;
          w = clamp(right - point.x, MIN_CROP, right - bounds.x);
          x = right - w;
        }
        h = w / aspect;
        y = centerY - h / 2;
        if (y < bounds.y) {
          y = bounds.y;
          h = Math.min(h, bounds.h);
          w = h * aspect;
          if (handle === "w") x = start.x + start.w - w;
        }
        if (y + h > bounds.y + bounds.h) {
          h = bounds.y + bounds.h - y;
          w = h * aspect;
          if (handle === "w") x = start.x + start.w - w;
        }
      } else {
        if (handle === "s") {
          y = start.y;
          h = clamp(point.y - y, MIN_CROP / aspect, bounds.y + bounds.h - y);
        } else {
          const bottom = start.y + start.h;
          h = clamp(bottom - point.y, MIN_CROP / aspect, bottom - bounds.y);
          y = bottom - h;
        }
        w = h * aspect;
        x = centerX - w / 2;
        if (x < bounds.x) {
          x = bounds.x;
          w = Math.min(w, bounds.w);
          h = w / aspect;
          if (handle === "n") y = start.y + start.h - h;
        }
        if (x + w > bounds.x + bounds.w) {
          w = bounds.x + bounds.w - x;
          h = w / aspect;
          if (handle === "n") y = start.y + start.h - h;
        }
      }

      return clampCropToImage({ x, y, w, h });
    }

    function resizeAspect(handle, point, start) {
      if (handle.length === 1) {
        return aspectRectFromEdge(handle, point, start);
      }
      return clampCropToImage(aspectRectFromCorner(handle, point, start));
    }

    function resizeCrop(handle, point) {
      const start = state.drag.startCrop;
      const next = state.aspect ? resizeAspect(handle, point, start) : resizeFree(handle, point, start);
      state.crop = clampCropToImage(next);
    }

    function dragCrop(point) {
      const drag = state.drag;
      const bounds = imageRect();
      state.crop = {
        ...drag.startCrop,
        x: clamp(drag.startCrop.x + point.x - drag.startPoint.x, bounds.x, bounds.x + bounds.w - drag.startCrop.w),
        y: clamp(drag.startCrop.y + point.y - drag.startPoint.y, bounds.y, bounds.y + bounds.h - drag.startCrop.h)
      };
    }

    function createCrop(point) {
      const drag = state.drag;
      const start = drag.startPoint;
      const bounds = imageRect();
      const fakeStart = {
        x: start.x,
        y: start.y,
        w: 1,
        h: 1
      };
      if (state.aspect) {
        const handle = point.x >= start.x
          ? (point.y >= start.y ? "se" : "ne")
          : (point.y >= start.y ? "sw" : "nw");
        state.crop = resizeAspect(handle, point, fakeStart);
      } else {
        const x = clamp(Math.min(start.x, point.x), bounds.x, bounds.x + bounds.w - MIN_CROP);
        const y = clamp(Math.min(start.y, point.y), bounds.y, bounds.y + bounds.h - MIN_CROP);
        const w = clamp(Math.abs(point.x - start.x), MIN_CROP, bounds.x + bounds.w - x);
        const h = clamp(Math.abs(point.y - start.y), MIN_CROP, bounds.y + bounds.h - y);
        state.crop = { x, y, w, h };
      }
    }

    function panImage(point) {
      const drag = state.drag;
      state.view.x = drag.startView.x + point.x - drag.startPoint.x;
      state.view.y = drag.startView.y + point.y - drag.startPoint.y;
      ensureCropFitsImage();
      constrainImageToCrop();
    }

    function onPointerDown(event) {
      if (!state.bitmap || !state.crop) return;
      const point = canvasPoint(event);
      const bounds = imageRect();
      if (!pointInRect(point, bounds) && !pointInRect(point, state.crop)) return;

      canvas.setPointerCapture(event.pointerId);
      const handle = getHandleAt(point);

      if (state.mode === "move" && !handle) {
        state.drag = {
          type: "pan",
          startPoint: point,
          startView: { ...state.view }
        };
        canvas.style.cursor = "grabbing";
      } else if (handle) {
        state.drag = {
          type: "resize",
          handle,
          startPoint: point,
          startCrop: { ...state.crop }
        };
        canvas.style.cursor = cursorForHandle(handle);
      } else if (pointInRect(point, state.crop)) {
        state.drag = {
          type: "dragCrop",
          startPoint: point,
          startCrop: { ...state.crop }
        };
        canvas.style.cursor = "move";
      } else {
        state.drag = {
          type: "newCrop",
          startPoint: point,
          startCrop: { ...state.crop }
        };
        createCrop(point);
      }
      render();
    }

    function onPointerMove(event) {
      if (!state.bitmap || !state.crop) return;
      const point = canvasPoint(event);

      if (!state.drag) {
        const handle = getHandleAt(point);
        if (handle) {
          canvas.style.cursor = cursorForHandle(handle);
        } else if (state.mode === "move" && pointInRect(point, imageRect())) {
          canvas.style.cursor = "grab";
        } else if (pointInRect(point, state.crop)) {
          canvas.style.cursor = "move";
        } else if (pointInRect(point, imageRect())) {
          canvas.style.cursor = "crosshair";
        } else {
          canvas.style.cursor = "default";
        }
        return;
      }

      if (state.drag.type === "pan") {
        panImage(point);
      } else if (state.drag.type === "resize") {
        resizeCrop(state.drag.handle, point);
      } else if (state.drag.type === "dragCrop") {
        dragCrop(point);
      } else if (state.drag.type === "newCrop") {
        createCrop(point);
      }
      render();
    }

    function onPointerUp(event) {
      if (state.drag) {
        state.drag = null;
        canvas.releasePointerCapture(event.pointerId);
        canvas.style.cursor = state.mode === "move" ? "grab" : "default";
        render();
        commitHistory();
      }
    }

    function setAspect(key) {
      state.aspectKey = key;
      state.aspect = ratios[key];
      syncRatioButtons();
      setActivePreset("");
      if (!state.crop || !state.bitmap) return;
      if (!state.aspect) {
        render();
        commitHistory();
        return;
      }
      const bounds = imageRect();
      const center = {
        x: state.crop.x + state.crop.w / 2,
        y: state.crop.y + state.crop.h / 2
      };
      const current = fitAspectInside(state.crop.w, state.crop.h, state.aspect);
      const max = fitAspectInside(bounds.w, bounds.h, state.aspect);
      const w = Math.min(Math.max(current.w, MIN_CROP), max.w);
      const h = w / state.aspect;
      state.crop = clampCropToImage({
        x: center.x - w / 2,
        y: center.y - h / 2,
        w,
        h
      });
      constrainImageToCrop();
      render();
      commitHistory();
    }

    function setZoom(percent, anchorPoint = null) {
      if (!state.bitmap || !state.crop) return;
      const oldScale = state.view.scale;
      const anchor = anchorPoint || {
        x: state.crop.x + state.crop.w / 2,
        y: state.crop.y + state.crop.h / 2
      };
      const sourcePoint = {
        x: (anchor.x - state.view.x) / oldScale,
        y: (anchor.y - state.view.y) / oldScale
      };
      state.zoom = percent / 100;
      state.view.scale = calculateFitScale() * state.zoom;
      state.view.x = anchor.x - sourcePoint.x * state.view.scale;
      state.view.y = anchor.y - sourcePoint.y * state.view.scale;
      ensureCropFitsImage();
      constrainImageToCrop();
      zoomRange.value = String(percent);
      zoomValue.textContent = `${percent}%`;
      render();
    }

    function zoomWithWheel(event) {
      if (!state.bitmap || !state.crop) return;
      event.preventDefault();
      const current = Math.round(state.zoom * 100);
      const direction = event.deltaY > 0 ? -1 : 1;
      const step = event.ctrlKey ? 4 : 8;
      const next = clamp(current + direction * step, Number(zoomRange.min), Number(zoomRange.max));
      if (next === current) return;
      setZoom(next, canvasPoint(event));
      commitHistory();
    }

    function rotateImage(delta) {
      if (!state.image) return;
      state.rotation = (state.rotation + delta + 360) % 360;
      buildRotatedBitmap();
      resetViewAndCrop();
      commitHistory();
      setStatus(`已旋转到 ${state.rotation}°`);
    }

    function updateQualityState() {
      const lossy = formatSelect.value !== "image/png";
      const hasImage = Boolean(state.bitmap);
      qualityRange.disabled = !lossy || !hasImage;
      targetSizeToggle.disabled = !lossy || !hasImage;
      targetSizeInput.disabled = !lossy || !hasImage || !targetSizeToggle.checked;
      qualityValue.textContent = `${qualityRange.value}%`;
      targetSizeHint.textContent = lossy ? "JPEG/WebP 可用" : "PNG 不支持质量压缩";
    }

    function extensionForType(type) {
      if (type === "image/jpeg") return "jpg";
      if (type === "image/webp") return "webp";
      return "png";
    }

    function createOutputCanvas(type = formatSelect.value) {
      const source = getPixelCropSource();
      if (!source || !state.bitmap) {
        return null;
      }

      const exportSize = getExportSize(source);
      const out = document.createElement("canvas");
      out.width = exportSize.width;
      out.height = exportSize.height;
      const outCtx = out.getContext("2d");
      if (type === "image/jpeg") {
        outCtx.fillStyle = "#ffffff";
        outCtx.fillRect(0, 0, out.width, out.height);
      }
      outCtx.imageSmoothingEnabled = exportSize.scale !== 1;
      drawAdjustedImage(
        outCtx,
        state.bitmap,
        source.sx,
        source.sy,
        source.sw,
        source.sh,
        0,
        0,
        out.width,
        out.height
      );
      applySharpenToContext(outCtx, 0, 0, out.width, out.height);
      drawWatermark(outCtx, { x: 0, y: 0, width: out.width, height: out.height });
      return out;
    }

    function canvasToBlob(sourceCanvas, type, quality) {
      return new Promise((resolve) => {
        sourceCanvas.toBlob(resolve, type, quality);
      });
    }

    function getTargetBytes(type = formatSelect.value) {
      if (type === "image/png" || !targetSizeToggle.checked) return null;
      const kb = Number(targetSizeInput.value);
      if (!Number.isFinite(kb) || kb <= 0) return null;
      return Math.max(1, Math.round(kb * 1024));
    }

    async function compressCanvasToTarget(sourceCanvas, type, targetBytes, initialQuality) {
      const highQuality = clamp(initialQuality || 0.92, 0.4, 1);
      const initialBlob = await canvasToBlob(sourceCanvas, type, highQuality);
      if (!initialBlob) return null;
      if (initialBlob.size <= targetBytes) {
        return {
          blob: initialBlob,
          quality: highQuality,
          targetReached: true
        };
      }

      let low = 0.35;
      let high = highQuality;
      let best = null;
      let bestQuality = low;
      let smallest = initialBlob;
      let smallestQuality = highQuality;

      for (let i = 0; i < 9; i += 1) {
        const quality = (low + high) / 2;
        const blob = await canvasToBlob(sourceCanvas, type, quality);
        if (!blob) break;
        if (blob.size < smallest.size) {
          smallest = blob;
          smallestQuality = quality;
        }
        if (blob.size <= targetBytes) {
          best = blob;
          bestQuality = quality;
          low = quality;
        } else {
          high = quality;
        }
      }

      return {
        blob: best || smallest,
        quality: best ? bestQuality : smallestQuality,
        targetReached: Boolean(best)
      };
    }

    async function createExportBlob(type = formatSelect.value) {
      const out = createOutputCanvas(type);
      if (!out) return null;

      const quality = type === "image/png" ? undefined : Number(qualityRange.value) / 100;
      const targetBytes = getTargetBytes(type);
      let result = null;

      if (targetBytes) {
        result = await compressCanvasToTarget(out, type, targetBytes, quality);
      } else {
        const blob = await canvasToBlob(out, type, quality);
        if (blob) {
          result = {
            blob,
            quality,
            targetReached: true
          };
        }
      }

      if (!result || !result.blob) return null;
      return {
        canvas: out,
        blob: result.blob,
        quality: result.quality,
        targetBytes,
        targetReached: result.targetReached
      };
    }

    function cleanBaseName(name) {
      return (name || "image").replace(/\.[^.]+$/, "").replace(/[\\/:*?"<>|]+/g, "-") || "image";
    }

    function downloadBlob(blob, filename) {
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function copyCrop() {
      if (!navigator.clipboard || typeof ClipboardItem === "undefined") {
        setStatus("当前浏览器不支持复制图片到剪贴板。");
        return;
      }
      const out = createOutputCanvas("image/png");
      if (!out) {
        setStatus("还没有可复制的裁剪区域。");
        return;
      }
      const blob = await canvasToBlob(out, "image/png");
      if (!blob) {
        setStatus("复制失败，无法生成图片。");
        return;
      }
      try {
        await navigator.clipboard.write([
          new ClipboardItem({ "image/png": blob })
        ]);
        setStatus(`已复制 ${out.width} x ${out.height}px 图片。`);
      } catch (error) {
        setStatus("复制失败，浏览器可能要求 HTTPS 或剪贴板权限。");
      }
    }

    async function exportCrop() {
      const type = formatSelect.value;
      const result = await createExportBlob(type);
      if (!result) {
        setStatus("还没有可导出的裁剪区域。");
        return;
      }

      const base = cleanBaseName(state.imageName);
      downloadBlob(result.blob, `${base}-crop.${extensionForType(type)}`);
      const sizeInfo = `，${formatBytes(result.blob.size)}`;
      const targetInfo = result.targetBytes
        ? result.targetReached
          ? `，已压缩到 ${formatBytes(result.targetBytes)} 内`
          : "，已到最低质量但仍超过目标"
        : "";
      setStatus(`已导出 ${result.canvas.width} x ${result.canvas.height}px${sizeInfo}${targetInfo}。`);
    }

    async function exportBatch() {
      if (!state.batch.length || state.batchExporting) return;
      const type = formatSelect.value;
      const targetWidth = parseDimension(widthInput);
      const targetHeight = parseDimension(heightInput);
      const currentId = state.activeBatchId;
      const total = state.batch.length;
      let exported = 0;

      state.batchExporting = true;
      renderBatchList();
      try {
        for (let index = 0; index < total; index += 1) {
          const item = state.batch[index];
          setStatus(`正在批量导出 ${index + 1}/${total}：${item.name}`);
          const loaded = await loadFile(item.file, { batchId: item.id, silent: true });
          if (!loaded) continue;

          if (targetWidth && targetHeight) {
            widthInput.value = String(targetWidth);
            heightInput.value = String(targetHeight);
            const applied = applyOutputSize(targetWidth, targetHeight, "批量尺寸");
            if (!applied) applyAspectMax(targetWidth / targetHeight, "批量尺寸");
          }

          const result = await createExportBlob(type);
          if (!result) continue;
          const base = cleanBaseName(item.name);
          downloadBlob(result.blob, `${base}-crop.${extensionForType(type)}`);
          exported += 1;
          await wait(BATCH_DELAY_MS);
        }
      } finally {
        state.batchExporting = false;
        renderBatchList();
        if (currentId && state.batch.some((item) => item.id === currentId)) {
          await loadBatchItem(currentId);
          if (targetWidth && targetHeight) {
            widthInput.value = String(targetWidth);
            heightInput.value = String(targetHeight);
            const applied = applyOutputSize(targetWidth, targetHeight, "批量尺寸");
            if (!applied) applyAspectMax(targetWidth / targetHeight, "批量尺寸");
          }
        }
      }
      setStatus(`批量导出完成：${exported}/${total} 张。`);
    }

    function syncCanvasSize() {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const width = Math.max(1, Math.round(rect.width));
      const height = Math.max(1, Math.round(rect.height));
      if (canvas.width !== Math.round(width * dpr) || canvas.height !== Math.round(height * dpr)) {
        canvas.width = Math.round(width * dpr);
        canvas.height = Math.round(height * dpr);
      }
      state.canvas = { width, height, dpr };

      if (state.bitmap) {
        const source = getCropSource();
        centerImage();
        if (source) {
          state.crop = {
            x: state.view.x + source.sx * state.view.scale,
            y: state.view.y + source.sy * state.view.scale,
            w: source.sw * state.view.scale,
            h: source.sh * state.view.scale
          };
          ensureCropFitsImage();
          constrainImageToCrop();
        } else {
          state.crop = makeCenteredCrop(imageRect());
        }
      }
      render();
    }

      if (state.image) buildRotatedBitmap();
      resetViewAndCrop();
      commitHistory();
      setStatus("已重置。");
    });
    fitBtn.addEventListener("click", () => {
      state.zoom = 1;
      zoomRange.value = "100";
      zoomValue.textContent = "100%";
      resetViewAndCrop();
      commitHistory();
      setStatus("已适合屏幕。");
    });
    exportBtn.addEventListener("click", exportCrop);
    exportBtnTop.addEventListener("click", exportCrop);
    copyBtn.addEventListener("click", copyCrop);

    document.addEventListener("keydown", (event) => {
      const tag = document.activeElement && document.activeElement.tagName;
      const editingText = tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA";
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z") {
        event.preventDefault();
        if (event.shiftKey) redoEdit();
        else undoEdit();
        return;
      }
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "y") {
        event.preventDefault();
        redoEdit();
        return;
      }
      if (editingText) return;
      if (event.key === "Enter" && !exportBtn.disabled) {
        exportCrop();
      } else if (event.key.toLowerCase() === "r" && !rotateRightBtn.disabled) {
        rotateImage(90);
      }
    });

    new ResizeObserver(syncCanvasSize).observe(canvas);
    loadCustomTemplates();
    renderTemplateList();
    renderBatchList();
    updateQualityState();
    updateControls(false);
    syncCanvasSize();
  </script>
</body>
</html>
